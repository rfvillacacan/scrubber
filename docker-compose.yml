services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: scrubber-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: scrubber-web
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CERT_FULLCHAIN_PATH:-./certs/fullchain.crt}:/etc/nginx/ssl/fullchain.crt:ro
      - ${CERT_KEY_PATH:-./certs/private.key}:/etc/nginx/ssl/private.key:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz.php || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
